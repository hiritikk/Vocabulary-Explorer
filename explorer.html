<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabulary Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #18181a;
  --border: rgba(255,255,255,0.07);
  --text: #f0ede6;
  --muted: #7a7870;
  --accent: #7aa4d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  max-width: 430px;
  margin: 0 auto;
}

.topbar {
  padding: 14px 20px 12px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.back-btn:active { background: #222; }
.back-btn svg { width: 14px; height: 14px; fill: none; stroke: var(--muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.topbar-sub  { font-size: 11px; font-weight: 300; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 1px; }
.topbar-word { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--text); }

.filter-row {
  display: flex; flex-shrink: 0;
  padding: 0 20px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.filter-row::-webkit-scrollbar { display: none; }
.ftab {
  flex-shrink: 0;
  padding: 9px 16px; font-size: 13px; color: var(--muted);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .18s, border-color .18s;
  margin-bottom: -1px;
}
.ftab.active { color: var(--text); font-weight: 500; }

.lang-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px 9px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.lang-label { font-size: 11px; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
.toggle-wrap {
  display: flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 99px; padding: 2px; gap: 2px;
}
.lang-btn {
  padding: 4px 14px; border-radius: 99px; border: none;
  background: transparent; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: var(--muted); cursor: pointer; transition: all .18s;
}
.lang-btn.active { background: var(--accent); color: #0a1520; font-weight: 500; }

.tab-desc {
  padding: 7px 20px 8px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px;
}
.tab-desc-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.tab-desc-text {
  font-size: 12px; color: var(--muted); font-weight: 300;
}

.graph-wrap { flex: 1; position: relative; overflow: hidden; min-height: 0; }
canvas { display: block; touch-action: none; }

.not-found {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center; padding: 0 32px;
}
.not-found h2 { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.not-found p  { font-size: 14px; color: var(--muted); line-height: 1.5; }
.not-found a  { display: inline-block; margin-top: 20px; font-size: 13px; color: var(--accent); text-decoration: none; }

/* ── sheet ── */
.sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: #161618;
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 0 24px 52px;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.32,0,.2,1);
  z-index: 20; overflow-y: auto; scrollbar-width: none;
}
.sheet::-webkit-scrollbar { display: none; }
.sheet.open { transform: translateY(0); }

.handle { width: 36px; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; margin: 12px auto 20px; }
.word-main  { font-family: 'Lora', serif; font-size: clamp(24px,7vw,32px); font-weight: 600; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
.word-trans { font-family: 'Lora', serif; font-style: italic; font-size: 14px; color: var(--muted); margin-bottom: 12px; }
.meta-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.pos-badge  { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; letter-spacing: .05em; text-transform: uppercase; }
.pronounc   { font-size: 13px; color: var(--muted); }
.src-link   { font-size: 11px; color: var(--accent); text-decoration: none; opacity: .7; }
.src-link:hover { opacity: 1; }
.divider    { height: 1px; background: var(--border); margin: 0 0 16px; }
.s-label    { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
.s-def      { font-size: 15px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
.s-ex       { font-family: 'Lora', serif; font-style: italic; font-size: 15px; color: #b0ada6; line-height: 1.6; margin-bottom: 8px; }
.s-ex-note  { font-size: 11px; color: #4a4540; margin-bottom: 20px; }

/* dict results block */
.dict-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 8px;
}
.dict-header {
  display: flex; align-items: baseline; gap: 8px;
  padding: 12px 14px 6px;
}
.dict-cree {
  font-family: 'Lora', serif; font-size: 18px; font-weight: 600;
  color: var(--accent); text-decoration: none;
}
.dict-cree:hover { text-decoration: underline; }
.dict-pos {
  font-size: 10px; font-weight: 500; color: var(--muted);
  letter-spacing: .06em; text-transform: uppercase;
}
.dict-defs { padding: 0 14px 12px; }
.dict-def-item {
  font-size: 13px; color: var(--text);
  line-height: 1.5; padding: 2px 0;
  display: flex; gap: 6px;
}
.dict-num { color: var(--muted); flex-shrink: 0; }
.dict-src-tag {
  display: inline; font-size: 10px; font-weight: 500;
  color: var(--muted); letter-spacing: .04em;
  background: rgba(255,255,255,.05);
  border-radius: 4px; padding: 1px 5px; margin-left: 4px;
  vertical-align: middle;
}
.gap-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(186,119,23,0.1);
  border: 1px solid rgba(186,119,23,0.25);
  border-radius: 8px;
  padding: 8px 12px; margin-bottom: 12px;
}
.gap-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #BA7517; flex-shrink: 0;
}
.gap-text {
  font-size: 12px; color: #BA7517; font-weight: 500;
  letter-spacing: .03em;
}
.gap-sub {
  font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5;
}
.dict-no-results {
  font-size: 13px; color: var(--muted); padding: 4px 0 16px;
  line-height: 1.5;
}
.dict-search-link {
  display: inline-block; margin-top: 4px;
  font-size: 12px; color: var(--accent); text-decoration: none; opacity: .8;
}
.dict-search-link:hover { opacity: 1; }

.sheet-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.sheet-handle-inline {
  width: 36px; height: 4px;
  background: rgba(255,255,255,.1);
  border-radius: 2px; margin-top: 12px;
}
.close-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: none;
  cursor: pointer; color: var(--muted); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; margin-top: 10px; flex-shrink: 0;
}
.close-btn:active { background: rgba(255,255,255,.12); }

.word-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 4px;
}
.word-row .word-main { margin-bottom: 0; flex: 1; min-width: 0; }

.icon-btn {
  flex-shrink: 0;
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.04);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s; text-decoration: none;
}
.icon-btn:active { background: rgba(255,255,255,.1); }
.icon-btn svg { width: 15px; height: 15px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.icon-btn.speaker svg { stroke: var(--accent); }
.icon-btn.link svg { stroke: var(--muted); }
.icon-btn.link:hover svg { stroke: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div>
    <div class="topbar-sub" id="appSub">Vocabulary Explorer</div>
    <div class="topbar-word" id="topbarWord"></div>
  </div>
</div>

<div class="filter-row" id="filterRow"></div>

<div class="lang-row">
  <span class="lang-label" id="langLabel">Language</span>
  <div class="toggle-wrap">
    <button class="lang-btn active" id="btnEng"  onclick="setLang('english')">English</button>
    <button class="lang-btn"        id="btnCree" onclick="setLang('cree')">Cree</button>
  </div>
</div>

<div class="tab-desc" id="tabDesc">
  <span class="tab-desc-dot" id="tabDescDot"></span>
  <span class="tab-desc-text" id="tabDescText"></span>
</div>

<div class="graph-wrap" id="graphWrap">
  <canvas id="c"></canvas>
  <div class="not-found" id="notFound" style="display:none">
    <h2>Word not found</h2>
    <p>We don't have that word yet.</p>
    <a href="index.html">← Search again</a>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-top">
    <div class="sheet-handle-inline"></div>
    <button class="close-btn" onclick="closeSheet()" title="Close">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="word-row">
    <div class="word-main" id="sWord"></div>
    <button class="icon-btn speaker" title="Listen to pronunciation" onclick="speakerTap(this)">
      <svg viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
    <a class="icon-btn link" id="sSrc" href="#" target="_blank" title="View in itwêwina" style="display:none">
      <svg viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </a>
  </div>
  <div class="word-trans" id="sTrans"></div>
  <div class="meta-row">
    <span class="pos-badge" id="sPos"></span>
    <span class="pronounc"  id="sPronounc"></span>
  </div>
  <div class="divider"></div>
  <div class="s-label" id="defLabel">Definition</div>
  <div class="s-def" id="sDef"></div>
  <div class="s-label" id="exLabel">Example</div>
  <div class="s-ex"  id="sEx"></div>
  <div class="s-ex-note" id="sExNote" style="display:none">⚠ Approximate — prototype only. Verify with a Cree language expert before use.</div>
  <div id="sDictSection"></div>
</div>

const mCtx=document.createElement('canvas').getContext('2d');
function measure(text,font){ mCtx.font=font; return mCtx.measureText(text).width; }

function primary(w)     { return lang==='cree' && w.cree!=='—' ? w.cree : w.eng; }
function translation(w) { return lang==='cree' ? w.eng : (w.cree!=='—'?w.cree:'—'); }

function spokeRadius(w,W,H){
  const base=Math.min(W,H);
  const tw=measure(primary(w),`500 ${Math.round(base*.032)}px DM Sans,sans-serif`);
  return Math.max(base*.095,Math.min(base*.19,tw/2+base*.052));
}
function hubRadius(W,H){ return Math.min(W,H)*.145; }
function setSheetHeight(){
  document.getElementById('sheet').style.maxHeight=Math.round(window.innerHeight*.56)+'px';
}

if(!hubData){

}

function applyStaticUI(){

  if(elEl) elEl.textContent=u.exLabel;

function getSpokeIds(){
  if(!hubData) return [];
  const map={category:'category',synonyms:'synonyms',antonyms:'antonyms',pos:'pos_forms'};
  return hubData[map[activeFilter]]||[];
}

function buildLayout(){
  const cv=document.getElementById('c');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  const ids=getSpokeIds(),n=ids.length,hR=hubRadius(W,H);
  const spokes=ids.map(id=>{
    const w=SPOKE_WORDS[id]||{eng:id,cree:'—',pos:'',pronounc:'',def:'',ex:''};
    return {...w,id,r:spokeRadius(w,W,H)};
  });
  const maxSR=spokes.reduce((m,s)=>Math.max(m,s.r),0);
  const orbit=Math.min(hR+Math.min(W,H)*.08+maxSR,Math.min(W,H)*.5-maxSR-8);
  spokes.forEach((sp,i)=>{
    const a=n===1?-Math.PI/2:(2*Math.PI*i/n)-Math.PI/2;
    sp.x=cx+orbit*Math.cos(a); sp.y=cy+orbit*Math.sin(a);
  });
  return {hub:{...hubData,id:urlWord,x:cx,y:cy,r:hR},spokes};
}

function drawScene(nodes,alpha){
  const cv=document.getElementById('c');
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,col=TAB_COLOR[activeFilter];
  const {hub,spokes}=nodes,base=Math.min(W,H);
  const spPrimSz=Math.round(base*.032),spSubSz=Math.round(base*.024);
  const hubPrimSz=Math.round(base*.052),hubSubSz=Math.round(base*.028);

  ctx.save(); ctx.globalAlpha=alpha;

  spokes.forEach(sp=>{
    ctx.beginPath(); ctx.moveTo(hub.x,hub.y); ctx.lineTo(sp.x,sp.y);
    ctx.strokeStyle=col+'38'; ctx.lineWidth=0.9;
    if(activeFilter==='antonyms'){ctx.setLineDash([4,4]);ctx.lineWidth=1;}
    else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
  });

  spokes.forEach(sp=>{
    const hasVerified=sp.cree&&sp.cree!=='—';
    ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2);
    ctx.fillStyle='#18181a'; ctx.fill();
    ctx.strokeStyle=(hasVerified?col:'#444240')+'90'; ctx.lineWidth=0.9; ctx.stroke();

    ctx.textAlign='center'; ctx.textBaseline='middle';

    if(lang==='cree' && !hasVerified){
      // semantic gap — draw a small amber dot + muted "?" instead of repeating English
      const dotR = Math.round(sp.r * 0.12);
      ctx.beginPath(); ctx.arc(sp.x, sp.y - sp.r*0.18, dotR, 0, Math.PI*2);
      ctx.fillStyle='#BA7517'; ctx.fill();
      ctx.font=`300 ${spSubSz}px 'DM Sans',sans-serif`;
      ctx.fillStyle='#4a4540';
      ctx.fillText('semantic gap', sp.x, sp.y + sp.r*0.28);
    } else {
      const prim=primary(sp), trans=translation(sp);
      const primItalic=lang==='cree'&&hasVerified;
      ctx.fillStyle=hasVerified?'#f0ede6':'#9a9890';
      ctx.font=`${primItalic?'italic ':''}500 ${spPrimSz}px '${primItalic?'Lora':'DM Sans'}',sans-serif`;
      ctx.fillText(clip(ctx,prim,sp.r*1.75),sp.x,sp.y-sp.r*.2);
      ctx.font=`italic 300 ${spSubSz}px 'Lora',serif`;
      ctx.fillStyle='#7a7870';
      ctx.fillText(clip(ctx,trans,sp.r*1.75),sp.x,sp.y+sp.r*.3);
    }
  });

  // hub
  ctx.beginPath(); ctx.arc(hub.x,hub.y,hub.r+base*.04,0,Math.PI*2);
  ctx.fillStyle=col+'10'; ctx.fill();
  ctx.beginPath(); ctx.arc(hub.x,hub.y,hub.r+base*.012,0,Math.PI*2);
  ctx.strokeStyle=col+'28'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(hub.x,hub.y,hub.r,0,Math.PI*2);
  ctx.fillStyle='#18181a'; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='middle';
  const hPrimItalic=lang==='cree'&&hub.cree!=='—';
  ctx.fillStyle='#f0ede6';
  ctx.font=`${hPrimItalic?'italic ':''}600 ${hubPrimSz}px 'Lora',serif`;
  ctx.fillText(primary(hub),hub.x,hub.y-hub.r*.18);
  ctx.font=`italic 300 ${hubSubSz}px 'Lora',serif`;
  ctx.fillStyle='#7a7870';
  ctx.fillText(translation(hub),hub.x,hub.y+hub.r*.28);
  ctx.restore();
}

function clip(ctx,text,maxW){
  if(!text) return '';
  if(ctx.measureText(text).width<=maxW) return text;
  let t=text; while(t.length>2&&ctx.measureText(t+'…').width>maxW) t=t.slice(0,-1);
  return t+'…';
}

function eio(t){ return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

function animateTo(oldN,newN){
  if(raf) cancelAnimationFrame(raf);
  animating=true;
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,t0=performance.now();
  function step(now){
    const t=Math.min((now-t0)/270,1);
    ctx.clearRect(0,0,W,H);
    if(t<0.5&&oldN) drawScene(oldN,1-eio(t*2));
    if(t>0.4)       drawScene(newN,eio((t-0.4)/0.6));
    if(t<1) raf=requestAnimationFrame(step);
    else{animating=false;curNodes=newN;}
  }
  raf=requestAnimationFrame(step);
}

function initCanvas(){
  const cv=document.getElementById('c'),wrap=document.getElementById('graphWrap');
  cv.width=wrap.clientWidth; cv.height=wrap.clientHeight;
}
function renderCurrent(doAnim=false){
  if(!hubData) return;
  initCanvas();
  const newN=buildLayout();
  if(doAnim&&curNodes) animateTo(curNodes,newN);
  else{
    const cv=document.getElementById('c');
    cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
    drawScene(newN,1); curNodes=newN;
  }
}

function hitNode(px,py){
  if(!curNodes) return null;
  const {hub,spokes}=curNodes;
  for(const sp of spokes){if(Math.hypot(sp.x-px,sp.y-py)<sp.r+12) return sp;}
  if(Math.hypot(hub.x-px,hub.y-py)<hub.r+12) return hub;
  return null;
}
function handleTap(px,py){
  if(animating) return;
  const hit=hitNode(px,py);
  if(!hit){closeSheet();return;}
  openSheet(hit);
}

const cv=document.getElementById('c');
let tsx=0,tsy=0,tmv=false;
cv.addEventListener('touchstart',e=>{const t=e.touches[0];tsx=t.clientX;tsy=t.clientY;tmv=false;},{passive:true});
cv.addEventListener('touchmove', e=>{const t=e.touches[0];if(Math.hypot(t.clientX-tsx,t.clientY-tsy)>8)tmv=true;},{passive:true});
cv.addEventListener('touchend',  e=>{
  if(tmv) return;
  const r=cv.getBoundingClientRect(),t=e.changedTouches[0];
  handleTap(t.clientX-r.left,t.clientY-r.top);
});
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  handleTap(e.clientX-r.left,e.clientY-r.top);
});

function openSheet(w){
  currentSheetWord = w; // remember for lang toggle re-render
  const posCol=POS_COLORS[w.pos]||'#888';
  const hasDirect=w.cree&&w.cree!=='—';
  const showCree=lang==='cree';

  // word + translation
  document.getElementById('sWord').textContent=primary(w);
  document.getElementById('sTrans').textContent=hasDirect?translation(w):'';

  // pos + pronunciation
  document.getElementById('sPronounc').textContent=w.pronounc;
  const posEl=document.getElementById('sPos');
  posEl.textContent=w.pos;
  posEl.style.cssText=`background:${posCol}20;color:${posCol};border:1px solid ${posCol}35`;

  // source link
  const u=UI_TEXT[lang];
  const srcEl=document.getElementById('sSrc');
  if(w.src){ srcEl.href=ITWEWINA+'/word/'+w.src+'/'; srcEl.style.display='flex'; srcEl.title='View in itwêwina'; }
  else srcEl.style.display='none';

  // definition + example — use Cree versions if in Cree mode and they exist
  const def = showCree && hasDirect && w.cree_def ? w.cree_def : w.def;
  const rawEx = showCree && hasDirect && w.cree_ex ? w.cree_ex : w.ex;
  const isApprox = rawEx.includes('[prototype approximation]');
  const cleanEx  = rawEx.replace(' [prototype approximation]','');
  document.getElementById('sDef').textContent=def;
  document.getElementById('sEx').textContent=cleanEx;
  const noteEl=document.getElementById('sExNote');
  if(noteEl) noteEl.style.display = isApprox ? '' : 'none';

  // dict results / semantic gap — only shown when no direct Cree word
  const dictSec=document.getElementById('sDictSection');
  if(!hasDirect){
    const results=w.dictResults||[];
    const first=results[0]||null;
    let html='';
    if(!first){
      html+=`<div class="gap-badge">
        <span class="gap-dot"></span>
        <span class="gap-text">${u.gapTitle}</span>
      </div>
      <p class="gap-sub">${u.gapSub}
        <a class="dict-search-link" href="${ITWEWINA}/search?q=${encodeURIComponent(w.eng)}" target="_blank">
          ${u.searchOn}
        </a>
      </p>`;
    } else {
      html+=`<div class="s-label">${u.closest}</div>
      <div class="dict-block">
        <div class="dict-header">
          <a class="dict-cree" href="${ITWEWINA}/word/${first.src}/" target="_blank">${first.cree}</a>
          <span class="dict-pos">${first.pos}</span>
        </div>
        <div class="dict-defs">`;
      first.defs.forEach((d,i)=>{
        html+=`<div class="dict-def-item">
          <span class="dict-num">${i+1}.</span>
          <span>${d.text}<span class="dict-src-tag">${d.tag}</span></span>
        </div>`;
      });
      html+=`</div></div>
      <a class="dict-search-link" href="${ITWEWINA}/search?q=${encodeURIComponent(w.eng)}" target="_blank">
        ${u.seeAll}
      </a>`;
    }
    dictSec.innerHTML=html;
    dictSec.style.display='';
  } else {
    dictSec.innerHTML='';
    dictSec.style.display='none';
  }

  document.getElementById('sheet').classList.add('open');
}

sh.addEventListener('touchend',  e=>{if(e.changedTouches[0].clientY-shty>55)closeSheet();},{passive:true});

window.addEventListener('resize',()=>{setSheetHeight();renderCurrent(false);});
