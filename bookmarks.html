<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Saved Words — Vocabulary Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="js/auth.js"></script>
<script src="dict.js"></script>
<style>
:root{--bg:#110e0b;--surface:#1c1810;--surface2:#252017;--border:rgba(240,200,120,0.09);--text:#f3ece0;--muted:#8a7d6a;--accent:#c17f24;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:48px;}
.topbar{position:sticky;top:0;z-index:10;background:rgba(17,14,11,0.96);backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:12px;padding:14px 20px 12px;border-bottom:1px solid var(--border);}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn svg{width:14px;height:14px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;}
.topbar-title{font-size:15px;font-weight:500;color:var(--text);flex:1;}
.toggle-wrap{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px;gap:2px;}
.lang-btn{padding:4px 12px;border-radius:99px;border:none;background:transparent;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .18s;}
.lang-btn.active{background:var(--accent);color:#0c0800;font-weight:500;}
.section-header{padding:20px 20px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.section-title{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.section-count{font-size:12px;color:var(--muted);}
.word-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px 14px 24px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;text-decoration:none;position:relative;
}
.word-card::before{
  content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;
  border-radius:0 2px 2px 0;background:var(--pos-col,var(--border));opacity:0.6;transition:opacity .15s;
}
.word-card:active{background:var(--surface);}
.word-card:active::before{opacity:1;}
.card-left{flex:1;min-width:0;}
.card-eng{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.card-cree{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--text);line-height:1.1;margin-bottom:5px;}
.card-pos{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;display:inline-block;letter-spacing:.04em;text-transform:uppercase;}
.remove-btn{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;}
.remove-btn:active{background:rgba(224,122,84,0.12);border-color:rgba(224,122,84,0.3);}
.remove-btn svg{width:13px;height:13px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 32px;text-align:center;}
.empty-icon{width:56px;height:56px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;margin-bottom:22px;}
.empty-icon svg{width:22px;height:22px;fill:none;stroke:var(--muted);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.empty-title{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:24px;}
.empty-link{font-size:13px;color:var(--accent);text-decoration:none;}
.empty-link:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">Saved Words</span>
  <div class="toggle-wrap">
    <button class="lang-btn" id="btnEng" onclick="setLang('english')">English</button>
    <button class="lang-btn" id="btnCree" onclick="setLang('cree')">Cree</button>
  </div>
</div>

<div id="listWrap"></div>

<script>
Auth.init();
Auth.requireAuth();

let lang = localStorage.getItem('veLang') || 'english';

function setLang(l) {
  lang=l; localStorage.setItem('veLang',l);
  document.getElementById('btnEng').classList.toggle('active',l==='english');
  document.getElementById('btnCree').classList.toggle('active',l==='cree');
  render();
}
function removeBm(key, e) { e.preventDefault(); e.stopPropagation(); Auth.toggleBookmark(key); render(); }
function render() {
  const bm=Auth.getBookmarks(), wrap=document.getElementById('listWrap');
  if(!bm.length){
    wrap.innerHTML=`<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
      <div class="empty-title">No saved words yet</div>
      <div class="empty-sub">Explore vocabulary and tap the bookmark<br>on any word to save it here.</div>
      <a class="empty-link" href="index.html">← Back to search</a>
    </div>`;
    return;
  }
  const words=bm.map(key=>{const w=typeof getWord==='function'?getWord(key):DICT[key];return w?{...w,key}:null;}).filter(Boolean);
  const POS_COLORS_LOCAL=typeof POS_COLORS!=='undefined'?POS_COLORS:{};
  let html=`<div class="section-header">
    <span class="section-title">${lang==='cree'?'kâ-kiskinohamâtêk':'Starred words'}</span>
    <span class="section-count">${words.length}</span>
  </div>`;
  words.forEach(w=>{
    const col=POS_COLORS_LOCAL[w.pos]||'#888';
    const primaryLabel=lang==='cree'?(w.cree||w.eng):w.eng;
    const secondaryLabel=lang==='cree'?w.eng:(w.cree||'');
    html+=`<a class="word-card" href="explorer.html?word=${encodeURIComponent(w.key)}&open=1" style="--pos-col:${col}">
      <div class="card-left">
        <div class="card-eng">${secondaryLabel}</div>
        <div class="card-cree">${primaryLabel}</div>
        <span class="card-pos" style="background:${col}22;color:${col};border:1px solid ${col}35">${w.posLabel||w.pos||''}</span>
      </div>
      <button class="remove-btn" onclick="removeBm('${w.key}',event)" title="Remove bookmark">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </a>`;
  });
  wrap.innerHTML=html;
}
document.getElementById('btnEng').classList.toggle('active',lang==='english');
document.getElementById('btnCree').classList.toggle('active',lang==='cree');
render();
</script>
</body>
</html>
