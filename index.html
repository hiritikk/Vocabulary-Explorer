<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabulary Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="js/auth.js"></script>
<script src="dict.js"></script>
<style>
:root {
  --bg:#0f0d0a; --surface:#1a1813; --surface2:#242018;
  --border:rgba(240,210,140,0.08); --text:#f4eddf; --muted:#8c7e6a; --accent:#c48a28;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  max-width:430px;margin:0 auto;padding:0 28px;min-height:100dvh;
  background-image:radial-gradient(ellipse 80% 45% at 50% 0%, rgba(196,138,40,0.05) 0%, transparent 65%);
}
.top-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  display:flex;justify-content:space-between;align-items:center;padding:14px 20px;z-index:10;
}
.nav-icons{display:flex;align-items:center;gap:8px;}
.nav-btn{
  width:32px;height:32px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background .15s;
}
.nav-btn:active{background:var(--surface2);}
.nav-btn svg{width:14px;height:14px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.drop-star{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,border-color .15s;
}
.drop-star:active{background:rgba(196,138,40,0.12);}
.drop-star svg{width:13px;height:13px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:fill .15s,stroke .15s;}
.drop-star.starred svg{fill:var(--accent);stroke:var(--accent);}
.toggle-wrap{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px;gap:2px;}
.lang-btn{padding:5px 14px;border-radius:99px;border:none;background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .18s;}
.lang-btn.active{background:var(--accent);color:#0c0800;font-weight:500;}
.logo-wrap{text-align:center;margin-bottom:44px;}
.logo-sub{
  font-size:11px;font-weight:300;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px;opacity:.8;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.logo-sub::before,.logo-sub::after{content:'';display:block;width:28px;height:1px;background:rgba(196,138,40,0.35);}
.logo-title{font-family:'Lora',serif;font-size:clamp(30px,8vw,38px);font-weight:600;color:var(--text);line-height:1.15;}
.logo-title span{color:var(--accent);}
.search-outer{width:100%;position:relative;}
.search-wrap{width:100%;position:relative;}
.search-input{
  width:100%;padding:15px 100px 15px 18px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);
  outline:none;transition:border-color .2s,border-radius .15s;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:rgba(196,138,40,0.4);}
.search-input.open{border-radius:14px 14px 0 0;border-bottom-color:transparent;}
.search-btns{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;}
.search-btn{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.search-btn:active{opacity:.75;}
.search-btn svg{width:16px;height:16px;fill:none;stroke:#0c0800;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.mic-btn{width:36px;height:36px;border-radius:10px;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.mic-btn:active{background:rgba(255,255,255,.06);}
.mic-btn.listening{background:rgba(224,122,84,0.15);border-color:rgba(224,122,84,0.4);}
.mic-btn svg{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.mic-btn.listening svg{stroke:#e07a54;}
.dropdown{
  display:none;position:absolute;top:100%;left:0;right:0;
  background:var(--surface);border:1px solid rgba(196,138,40,0.35);border-top:none;
  border-radius:0 0 14px 14px;z-index:20;max-height:260px;overflow-y:auto;scrollbar-width:none;
}
.dropdown::-webkit-scrollbar{display:none;}
.dropdown.visible{display:block;}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover,.drop-item.focused{background:rgba(196,138,40,0.05);}
.drop-primary{font-size:15px;font-weight:500;color:var(--text);flex:1;min-width:0;}
.drop-primary em{font-style:normal;color:var(--accent);}
.drop-secondary{font-family:'Lora',serif;font-style:italic;font-size:12px;color:var(--muted);flex-shrink:0;}
.drop-tag{font-size:10px;font-weight:500;letter-spacing:.05em;padding:2px 7px;border-radius:99px;background:rgba(196,138,40,0.12);color:var(--accent);flex-shrink:0;}
.drop-connect{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,border-color .15s;color:var(--muted);
}
.drop-connect:hover{background:rgba(196,138,40,0.12);border-color:rgba(196,138,40,0.3);color:var(--accent);}
.drop-connect svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.drop-divider{padding:6px 16px 4px;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.drop-empty{padding:16px;font-size:13px;color:var(--muted);text-align:center;}
.hint{margin-top:14px;font-size:12px;color:var(--muted);text-align:center;}
.hint span{color:rgba(196,138,40,0.7);cursor:pointer;transition:color .15s;}
.hint span:hover{color:var(--accent);}
</style>
</head>
<body>

<div class="top-bar">
  <div class="nav-icons">
    <a class="nav-btn" href="bookmarks.html" title="Saved words">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </a>
    <button class="nav-btn" onclick="Auth.logout()" title="Sign out">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
  <div class="toggle-wrap">
    <button class="lang-btn" id="btnEng"  onclick="setLang('english')">English</button>
    <button class="lang-btn" id="btnCree" onclick="setLang('cree')">Cree</button>
  </div>
</div>

<div class="logo-wrap">
  <div class="logo-sub" id="logoSub">nêhiyawêwin</div>
  <div class="logo-title" id="logoTitle">Vocabulary<br><span id="logoSpan">Explorer</span></div>
</div>

<div class="search-outer">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="onInput()" onkeydown="onKeyDown(event)" onfocus="onInputFocus()">
    <div class="search-btns">
      <button class="mic-btn" id="micBtn" onclick="micTap()" title="Search by voice">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <button class="search-btn" onclick="goSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
    </div>
  </div>
  <div class="dropdown" id="dropdown"></div>
</div>

<div class="hint" id="hintText"></div>

<script>
Auth.init();
Auth.requireAuth();

const UI = {
  english: {
    sub: 'nêhiyawêwin', title: 'Vocabulary', span: 'Explorer',
    placeholder: 'Search a word…', hint: 'Try',
    hintWords: ['cool', 'walk', 'bear'],
    noResults: 'No results. Try spelling it differently.',
  },
  cree: {
    sub: 'Plains Cree Dictionary', title: 'itwêwina', span: 'kâ-nisitohtahk',
    placeholder: 'mâhkiya pîkiskwêwin…', hint: 'mâmitonêyihtamok',
    hintWords: ['tahkâyâw', 'pimohcêw', 'maskwa'],
    noResults: 'namôya kiskêyihtâkwan. isi-mâhkiya.',
  },
};
const CREE_HINT_KEYS = { 'tahkâyâw': 'cool', 'pimohcêw': 'walk', 'maskwa': 'bear' };
let lang = localStorage.getItem('veLang') || 'english';
let focusedIdx = -1;
let currentResults = [];

function setLang(l) {
  lang = l; localStorage.setItem('veLang', l); applyUI(); closeDropdown();
  document.getElementById('searchInput').value = '';
}
function applyUI() {
  const u = UI[lang];
  document.getElementById('btnEng').classList.toggle('active', lang === 'english');
  document.getElementById('btnCree').classList.toggle('active', lang === 'cree');
  document.getElementById('logoSub').textContent = u.sub;
  document.getElementById('logoTitle').innerHTML = `${u.title}<br><span style="color:var(--accent)">${u.span}</span>`;
  document.getElementById('searchInput').placeholder = u.placeholder;
  document.getElementById('hintText').innerHTML = u.hint + ' ' + u.hintWords.map(w => `<span onclick="goWord('${w}')">${w}</span>`).join(', ');
}
function goWord(w) { const key = CREE_HINT_KEYS[w] || w.toLowerCase(); window.location.href = `explorer.html?word=${encodeURIComponent(key)}`; }
function goSearch() {
  const q = document.getElementById('searchInput').value.trim(); if (!q) return;
  const res = searchDict(q); if (res[0]) window.location.href = `explorer.html?word=${encodeURIComponent(res[0].key)}`;
}
function goResult(word) { window.location.href = `explorer.html?word=${encodeURIComponent(word.key)}`; }

function norm(s) {
  return s.toLowerCase().replace(/[âā]/g,'a').replace(/[êē]/g,'e').replace(/[îī]/g,'i').replace(/[ôō]/g,'o').replace(/[ýÿ]/g,'y');
}
function highlight(text, q) {
  if (!q) return text;
  const idx = norm(text).indexOf(norm(q)); if (idx < 0) return text;
  return text.slice(0,idx)+'<em>'+text.slice(idx,idx+q.length)+'</em>'+text.slice(idx+q.length);
}
function scoreFn(w, nq) {
  const ne=norm(w.eng), nc=w.cree?norm(w.cree):'';
  if(ne===nq||nc===nq) return 0; if(ne.startsWith(nq)||nc.startsWith(nq)) return 1;
  if(ne.includes(nq)||nc.includes(nq)) return 2; return 99;
}
function searchDict(q) {
  if (!q||q.length<1) return [];
  const nq=norm(q);
  return Object.values(DICT).map(w=>({w,s:scoreFn(w,nq)})).filter(x=>x.s<99)
    .sort((a,b)=>a.s-b.s||a.w.eng.localeCompare(b.w.eng)).map(x=>x.w);
}

function onInput() {
  const q=document.getElementById('searchInput').value.trim(); focusedIdx=-1;
  if(!q){closeDropdown();return;} currentResults=searchDict(q); renderDropdown(q);
}
function onInputFocus() { const q=document.getElementById('searchInput').value.trim(); if(q&&currentResults.length) renderDropdown(q); }

const CONNECT_ICON = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><circle cx="12" cy="4" r="1.8"/><circle cx="20" cy="12" r="1.8"/><circle cx="12" cy="20" r="1.8"/><circle cx="4" cy="12" r="1.8"/><line x1="12" y1="6" x2="12" y2="9.5"/><line x1="17.8" y1="12" x2="14.5" y2="12"/><line x1="12" y1="14.5" x2="12" y2="18"/><line x1="6.2" y1="12" x2="9.5" y2="12"/></svg>`;
const STAR_ICON = `<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function starItem(key, e) {
  e.stopPropagation(); Auth.toggleBookmark(key);
  e.currentTarget.classList.toggle('starred', Auth.isBookmarked(key));
}
function renderDropdown(q) {
  const dd=document.getElementById('dropdown'), inp=document.getElementById('searchInput');
  if(!currentResults.length){dd.innerHTML=`<div class="drop-empty">${UI[lang].noResults}</div>`;dd.classList.add('visible');inp.classList.add('open');return;}
  const hubKeys=new Set(Object.keys(DICT).filter(k=>DICT[k].category||DICT[k].synonyms));
  const hubs=currentResults.filter(w=>hubKeys.has(w.key));
  const spokes=currentResults.filter(w=>!hubKeys.has(w.key));
  let html='';
  const row=(w,i)=>{
    const isPrimCree=lang==='cree'&&w.cree;
    const primary=isPrimCree?highlight(w.cree,q):highlight(w.eng,q);
    const secondary=isPrimCree?w.eng:(w.cree||'—');
    const starred=Auth.isBookmarked(w.key);
    return `<div class="drop-item" onclick="goResult(${JSON.stringify({key:w.key})})" data-idx="${i}">
      <div class="drop-primary">${primary}</div>
      <span class="drop-secondary">${secondary}</span>
      <span class="drop-tag">${w.posLabel||w.pos}</span>
      <span class="drop-star${starred?' starred':''}" title="Save word" onclick="starItem('${w.key}',event)">${STAR_ICON}</span>
      <span class="drop-connect" title="Explore connections" onclick="event.stopPropagation();window.location.href='explorer.html?word=${encodeURIComponent(w.key)}'">${CONNECT_ICON}</span>
    </div>`;
  };
  hubs.forEach((w,i)=>html+=row(w,i));
  if(spokes.length){html+=`<div class="drop-divider">${lang==='cree'?'kâ-wîci-pîkiskwâtêmakak':'related words'}</div>`;spokes.forEach((w,i)=>html+=row(w,hubs.length+i));}
  dd.innerHTML=html; dd.classList.add('visible'); inp.classList.add('open');
}
function closeDropdown() { document.getElementById('dropdown').classList.remove('visible'); document.getElementById('searchInput').classList.remove('open'); focusedIdx=-1; }
function onKeyDown(e) {
  const items=document.querySelectorAll('.drop-item');
  if(e.key==='ArrowDown'){e.preventDefault();focusedIdx=Math.min(focusedIdx+1,items.length-1);updateFocus(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();focusedIdx=Math.max(focusedIdx-1,-1);updateFocus(items);}
  else if(e.key==='Enter'){e.preventDefault();if(focusedIdx>=0&&items[focusedIdx])items[focusedIdx].click();else goSearch();}
  else if(e.key==='Escape')closeDropdown();
}
function updateFocus(items){items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIdx));}
document.addEventListener('click',e=>{if(!document.querySelector('.search-outer').contains(e.target))closeDropdown();});

function micTap() {
  const btn=document.getElementById('micBtn');
  if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=new SR();
    rec.lang=lang==='cree'?'cr':'en-CA'; rec.interimResults=false; rec.maxAlternatives=1;
    btn.classList.add('listening'); rec.start();
    rec.onresult=e=>{document.getElementById('searchInput').value=e.results[0][0].transcript;btn.classList.remove('listening');onInput();};
    rec.onerror=rec.onend=()=>btn.classList.remove('listening');
  } else { btn.classList.add('listening'); setTimeout(()=>btn.classList.remove('listening'),1200); }
}
applyUI();
</script>
</body>
</html>
